name: Repository Integrity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install --upgrade pip
      - run: .venv/bin/pip install -e 'apps/agent[dev]'
      - run: npm run repository:integrity
      - run: npm run contracts:types:check
