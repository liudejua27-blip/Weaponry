name: Tauri Preflight

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/desktop/src-tauri/**'
      - 'apps/desktop/**'
      - 'Cargo.lock'
      - '.github/workflows/tauri-preflight.yml'

permissions:
  contents: read

jobs:
  cargo-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            wget
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
